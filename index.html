<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0c"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Prime Music"/>
<title>Prime Music</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0c;--surface:#111114;--surface2:#18181d;--surface3:#1e1e26;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --accent:#c8a96e;--accent-dim:rgba(200,169,110,0.12);--accent-glow:rgba(200,169,110,0.06);
  --text:#ede8e0;--text2:#908880;--muted:#5a5550;
  --success:#6db88a;--warn:#e0b84a;--danger:#c06060;
  --display:'Cormorant Garamond',serif;--body:'DM Sans',sans-serif;
  --r:14px;--r-sm:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
#app{min-height:100vh;}

/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 30% 20%,rgba(200,169,110,0.07) 0%,transparent 60%),var(--bg);}
.login-box{width:100%;max-width:360px;}
.login-logo{font-family:var(--display);font-size:44px;font-weight:700;color:var(--accent);margin-bottom:4px;}
.login-logo span{color:var(--text);font-weight:400;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:36px;}
.lbl{display:block;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.inp{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-sm);padding:13px 16px;color:var(--text);font-family:var(--body);font-size:15px;outline:none;margin-bottom:14px;transition:border-color 0.2s;}
.inp:focus{border-color:var(--accent);}
.login-btn{width:100%;padding:14px;border-radius:var(--r-sm);background:var(--accent);border:none;color:#0a0a0c;font-size:15px;font-weight:600;font-family:var(--body);cursor:pointer;margin-top:4px;}
.login-err{background:rgba(192,96,96,0.1);border:1px solid rgba(192,96,96,0.3);border-radius:var(--r-sm);padding:10px 14px;color:var(--danger);font-size:13px;margin-bottom:12px;display:none;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh;}
@media(max-width:768px){.layout{grid-template-columns:1fr;}}

/* SIDEBAR */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
@media(max-width:768px){.sidebar{position:fixed;bottom:0;left:0;right:0;top:auto;height:auto;flex-direction:row;border-right:none;border-top:1px solid var(--border);z-index:50;}}
.sb-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
@media(max-width:768px){.sb-logo{display:none;}}
.sb-logo-text{font-family:var(--display);font-size:22px;font-weight:700;color:var(--accent);}
.sb-logo-text span{color:var(--text);font-weight:400;}
.sb-logo-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.nav-links{padding:12px 0;flex:1;}
@media(max-width:768px){.nav-links{display:flex;padding:0;flex:1;}}
.nav-a{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:all 0.15s;border-left:2px solid transparent;color:var(--text2);font-size:14px;}
.nav-a:hover{background:var(--accent-glow);color:var(--text);}
.nav-a.active{background:var(--accent-dim);color:var(--accent);border-left-color:var(--accent);}
@media(max-width:768px){.nav-a{flex:1;flex-direction:column;gap:2px;padding:10px 4px 14px;border-left:none;border-top:2px solid transparent;font-size:10px;text-align:center;}.nav-a.active{border-left:none;border-top-color:var(--accent);}}
.nav-icon{font-size:18px;}
@media(max-width:768px){.nav-icon{font-size:21px;}}
.sb-footer{padding:14px 20px;border-top:1px solid var(--border);}
@media(max-width:768px){.sb-footer{display:none;}}
.logout-btn{width:100%;padding:9px;border-radius:var(--r-sm);background:transparent;border:1px solid var(--border2);color:var(--text2);font-size:13px;cursor:pointer;font-family:var(--body);transition:all 0.2s;}
.logout-btn:hover{border-color:var(--danger);color:var(--danger);}

/* MAIN */
.main{overflow-y:auto;min-height:100vh;}
@media(max-width:768px){.main{padding-bottom:76px;}}
.ph{padding:24px 32px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}
@media(max-width:768px){.ph{padding:18px 16px 14px;}}
.ph-title{font-family:var(--display);font-size:26px;font-weight:700;}
@media(max-width:768px){.ph-title{font-size:20px;}}
.ph-sub{font-size:12px;color:var(--text2);margin-top:3px;}
.pb{padding:22px 32px;}
@media(max-width:768px){.pb{padding:14px 16px;}}

/* DAY TABS */
.day-tabs{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;padding:7px 14px;border-radius:30px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--body);font-size:13px;cursor:pointer;transition:all 0.2s;}
.day-tab:hover{border-color:var(--accent);color:var(--accent);}
.day-tab.active{background:var(--accent);color:#0a0a0c;border-color:var(--accent);font-weight:600;}
.day-tab.today-tab{border-color:var(--accent);color:var(--accent);}

/* SCHEDULE */
.slist{display:flex;flex-direction:column;gap:5px;}
.slot{display:flex;align-items:center;gap:14px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all 0.15s;position:relative;}
.slot::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;border-radius:3px 0 0 3px;transition:background 0.15s;}
.slot:hover{border-color:var(--border2);background:var(--surface2);}
.slot:hover::before{background:var(--accent);}
.slot.es{cursor:default;opacity:0.35;}
.slot.es:hover{border-color:var(--border);background:var(--surface);}
.slot.es::before,.slot.cs::before{display:none;}
.slot.cs{cursor:default;opacity:0.4;}
.slot-time{font-family:var(--display);font-size:19px;font-weight:600;color:var(--accent);min-width:52px;flex-shrink:0;}
.slot-name{font-size:14px;font-weight:500;flex:1;}
.slot-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.slot-arr{color:var(--muted);font-size:18px;flex-shrink:0;}
.bdg{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;}
.bdg-ok{background:rgba(109,184,138,0.1);color:var(--success);border:1px solid rgba(109,184,138,0.2);}
.bdg-no{background:rgba(192,96,96,0.1);color:var(--danger);border:1px solid rgba(192,96,96,0.2);}

/* TODAY BANNER */
.today-banner{background:var(--accent-dim);border:1px solid rgba(200,169,110,0.2);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.today-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* STUDENTS */
.stu-row{display:flex;align-items:center;gap:14px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all 0.15s;margin-bottom:5px;}
.stu-row:hover{border-color:var(--border2);background:var(--surface2);}
.stu-av{width:42px;height:42px;border-radius:11px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}

/* PROFILE */
.back-btn{display:flex;align-items:center;gap:5px;color:var(--text2);font-size:13px;cursor:pointer;padding:0;background:none;border:none;font-family:var(--body);margin-bottom:4px;}
.back-btn:hover{color:var(--accent);}
.ph-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.btn-prim{padding:9px 18px;border-radius:var(--r-sm);background:var(--accent);border:none;color:#0a0a0c;font-size:13px;font-weight:600;font-family:var(--body);cursor:pointer;}
.wa-btn{padding:9px 14px;border-radius:var(--r-sm);background:rgba(37,211,102,0.1);border:1px solid rgba(37,211,102,0.25);color:#25d166;font-size:13px;cursor:pointer;font-family:var(--body);text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px;}
.stat-c{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.stat-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
.stat-val{font-family:var(--display);font-size:24px;font-weight:700;}
.stat-val.g{color:var(--accent);}
.stat-val.gr{color:var(--success);}
.stat-val.r{color:var(--danger);}
.sec-title{font-family:var(--display);font-size:17px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.sec-btn{font-family:var(--body);font-size:11px;font-weight:500;color:var(--accent);background:var(--accent-dim);border:none;padding:4px 10px;border-radius:20px;cursor:pointer;}

/* STREAK DOTS */
.streak-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:16px;}
.streak-legend{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);}
.legend-dot{width:10px;height:10px;border-radius:50%;}
.streak-dots{display:flex;gap:8px;flex-wrap:wrap;}
.streak-dot{display:flex;flex-direction:column;align-items:center;gap:5px;}
.streak-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;transition:transform 0.1s;}
.streak-circle.green{background:rgba(109,184,138,0.15);border:2px solid var(--success);color:var(--success);}
.streak-circle.yellow{background:rgba(224,184,74,0.15);border:2px solid var(--warn);color:var(--warn);}
.streak-circle.red{background:rgba(192,96,96,0.15);border:2px solid var(--danger);color:var(--danger);}
.streak-circle.empty{background:var(--surface3);border:2px solid var(--border);}
.streak-date{font-size:9px;color:var(--muted);}

/* ATTENDANCE STREAK */
.att-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:16px;}
.att-dots{display:flex;gap:8px;flex-wrap:wrap;}
.att-dot{display:flex;flex-direction:column;align-items:center;gap:5px;}
.att-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;}
.att-circle.present{background:rgba(109,184,138,0.15);border:2px solid var(--success);color:var(--success);}
.att-circle.absent{background:rgba(192,96,96,0.15);border:2px solid var(--danger);color:var(--danger);}
.att-circle.empty{background:var(--surface3);border:2px solid var(--border);}
.att-date{font-size:9px;color:var(--muted);}

/* PROGRESS */
.crit-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.crit-name{font-size:12px;color:var(--text2);min-width:110px;flex-shrink:0;}
.crit-track{flex:1;height:5px;background:var(--surface3);border-radius:5px;overflow:hidden;}
.crit-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent),#e8d898);}
.crit-val{font-size:12px;font-weight:600;color:var(--accent);min-width:28px;text-align:right;}

/* LESSONS */
.lesson-it{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.lesson-it:last-child{border-bottom:none;}
.l-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.l-dot.paid{background:var(--success);}
.l-dot.unpaid{background:var(--danger);}
.l-dot.absent{background:var(--muted);}
.l-date{font-size:11px;color:var(--text2);}
.l-notes{font-size:13px;margin-top:3px;line-height:1.5;}
.mark-btn{padding:3px 10px;border-radius:20px;border:1px solid var(--accent);color:var(--accent);background:transparent;font-size:11px;cursor:pointer;font-family:var(--body);flex-shrink:0;}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
@media(min-width:769px){.modal-ov{align-items:center;}}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:22px 22px 40px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;border-top:1px solid var(--border2);}
@media(min-width:769px){.modal{border-radius:20px;border:1px solid var(--border2);}}
.modal-handle{width:36px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 18px;}
@media(min-width:769px){.modal-handle{display:none;}}
.modal-title{font-family:var(--display);font-size:20px;font-weight:700;margin-bottom:14px;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-sm);padding:10px 14px;color:var(--text);font-family:var(--body);font-size:14px;outline:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field textarea{resize:none;height:85px;}
.tog-row{display:flex;gap:7px;margin-bottom:13px;}
.tog{flex:1;padding:9px;border-radius:var(--r-sm);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:var(--body);text-align:center;transition:all 0.15s;}
.tog.on-ok{background:rgba(109,184,138,0.12);border-color:var(--success);color:var(--success);}
.tog.on-no{background:rgba(192,96,96,0.12);border-color:var(--danger);color:var(--danger);}
.m-actions{display:flex;gap:8px;margin-top:6px;}
.m-prim{flex:2;padding:13px;border-radius:var(--r-sm);background:var(--accent);border:none;color:#0a0a0c;font-size:14px;font-weight:600;font-family:var(--body);cursor:pointer;}
.m-sec{flex:1;padding:13px;border-radius:var(--r-sm);background:transparent;border:1px solid var(--border2);color:var(--text2);font-size:14px;font-family:var(--body);cursor:pointer;}

/* ELEV PAGE */
.elev-wrap{max-width:430px;margin:0 auto;min-height:100vh;}
.elev-hero{background:linear-gradient(160deg,#1a1408,#0a0a0c);padding:52px 24px 28px;border-bottom:1px solid var(--border);}
.elev-logo{font-family:var(--display);font-size:13px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;opacity:0.8;}
.elev-name{font-family:var(--display);font-size:26px;font-weight:700;}
.elev-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.elev-chip{padding:3px 10px;border-radius:20px;border:1px solid rgba(200,169,110,0.2);background:rgba(200,169,110,0.05);color:var(--accent);font-size:11px;}
.elev-body{padding:20px;}

/* PRACTICE BUTTONS */
.practice-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px;}
.practice-title{font-family:var(--display);font-size:18px;font-weight:700;margin-bottom:4px;}
.practice-sub{font-size:12px;color:var(--text2);margin-bottom:16px;}
.practice-btns{display:flex;flex-direction:column;gap:10px;}
.prac-btn{width:100%;padding:14px 18px;border-radius:var(--r);border:none;font-size:14px;font-weight:600;font-family:var(--body);cursor:pointer;display:flex;align-items:center;gap:10px;transition:all 0.2s;}
.prac-btn.clip{background:rgba(109,184,138,0.12);border:1.5px solid var(--success);color:var(--success);}
.prac-btn.bifare{background:rgba(224,184,74,0.12);border:1.5px solid var(--warn);color:var(--warn);}
.prac-btn.done{opacity:0.6;cursor:default;}
.prac-status{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;display:flex;align-items:center;gap:10px;font-size:13px;}

/* TOAST */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--success);color:var(--success);padding:9px 18px;border-radius:30px;font-size:13px;z-index:999;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.3s;}
#toast.show{opacity:1;}
.empty{text-align:center;padding:40px 20px;color:var(--text2);}
select option{background:var(--surface2);}
</style>

// Săptămâna curentă — Luni de la data curentă
function getWeekStart(date){
  const d=new Date(date||Date.now());
  const day=d.getDay();
  const diff=d.getDate()-(day===0?6:day-1);
  const monday=new Date(d.setDate(diff));
  return monday.toISOString().split("T")[0];
}

// Ultimele N săptămâni
function getLastWeeks(n){
  const weeks=[];
  for(let i=n-1;i>=0;i--){
    const d=new Date();
    d.setDate(d.getDate()-(i*7));
    weeks.push(getWeekStart(d));
  }
  return weeks;
}

let A={
  loggedIn:!!sessionStorage.getItem("pm_auth"),
  page:"acasa",day:azi||"Luni",
  student:null,students:[],lessons:[],practices:[],slots:{},weeklyIncome:[],weekOffset:0,monthOffset:0,searchQuery:"",
  modal:null,
  lf:{present:true,paid:false,notes:"",tema:""}
};

const H={"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,"Content-Type":"application/json","Prefer":"return=representation"};
const db={
  async get(t,q=""){const r=await fetch(`${SB_URL}/rest/v1/${t}${q}`,{headers:H});if(!r.ok)throw await r.text();return r.json();},
  async post(t,b){const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:"POST",headers:H,body:JSON.stringify(b)});if(!r.ok)throw await r.text();return r.json();},
  async patch(t,id,b){const r=await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:"PATCH",headers:H,body:JSON.stringify(b)});if(!r.ok)throw await r.text();return r.json();},
};

let tt;
function toast(m,tp="ok"){
  const el=document.getElementById("toast");
  el.textContent=m;
  el.style.borderColor=tp==="err"?"var(--danger)":tp==="warn"?"var(--warn)":"var(--success)";
  el.style.color=tp==="err"?"var(--danger)":tp==="warn"?"var(--warn)":"var(--success)";
  el.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>el.classList.remove("show"),2500);
}

function byName(n){return A.students.find(s=>s.name.toLowerCase()===n.toLowerCase());}
function sLessons(id){return A.lessons.filter(l=>l.student_id===id).sort((a,b)=>new Date(b.date)-new Date(a.date));}
function sPractices(id){return A.practices.filter(p=>p.student_id===id);}

function waLink(s){
  const url=`${location.origin}/elev/${s.magic_token}`;
  const msg=encodeURIComponent(`Bună ${s.name}! 🎵\nPagina ta Prime Music:\n${url}`);
  let p=s.phone?.replace(/\D/g,"");
  if(p&&p.startsWith("0")) p="40"+p.slice(1);
  return p?`https://wa.me/${p}?text=${msg}`:null;
}

async function loadData(){
  try{
    const[st,ls,pr,sl,wi]=await Promise.all([
      db.get("students","?select=*&order=name&archived=is.false"),
      db.get("lessons","?select=*&order=date.desc"),
      db.get("practice_logs","?select=*&order=week_start.desc"),
      db.get("schedule_slots","?select=*&order=sort_order"),
      db.get("weekly_income","?select=*&order=date.desc"),
    ]);
    A.students=st;A.lessons=ls;A.practices=pr;A.weeklyIncome=wi||[];
    // Group slots by day
    const slotsByDay={};
    sl.forEach(s=>{
      if(!slotsByDay[s.day])slotsByDay[s.day]=[];
      slotsByDay[s.day].push(s);
    });
    A.slots=slotsByDay;
    render();
  }catch(e){console.error(e);}
}

async function saveStudentInfo(id, sendLink=false){
  const name=document.getElementById("edit-name")?.value?.trim();
  const instrument=document.getElementById("edit-instrument")?.value;
  const level=document.getElementById("edit-level")?.value;
  const price=parseInt(document.getElementById("student-price")?.value)||100;
  const phone=document.getElementById("edit-phone")?.value?.trim();
  const avatar=instrument==="Pian"?"🎹":"🎸";
  if(!name){toast("Introdu un nume","err");return;}
  try{
    await db.patch("students",id,{name,instrument,level,price_per_lesson:price,phone,avatar});
    A.students=A.students.map(s=>s.id===id?{...s,name,instrument,level,price_per_lesson:price,phone,avatar}:s);
    if(A.student&&A.student.id===id){
      A.student={...A.student,name,instrument,level,price_per_lesson:price,phone,avatar};
    }
    toast("💾 Salvat!");
    if(sendLink){
      const s=A.students.find(st=>st.id===id)||A.student;
      if(s&&phone){
        let p=phone.replace(/\D/g,"");
        if(p.startsWith("0")) p="40"+p.slice(1);
        const url=`${location.origin}/elev/${s.magic_token}`;
        const msg=encodeURIComponent(`Bună ${s.name}! 🎵\nPagina ta Prime Music:\n${url}`);
        window.open(`https://wa.me/${p}?text=${msg}`,"_blank");
      } else {
        toast("Adaugă numărul de telefon mai întâi!","err");
      }
    }
    render();
  }catch(e){toast("❌ Eroare","err");}
}

async function savePrice(id){

  if(!val||val<1){toast("Introdu un preț valid","err");return;}
  try{

    A.students=A.students.map(s=>s.id===id?{...s,price_per_lesson:val}:s);

    toast(`💰 Preț actualizat: ${val} RON/lecție!`);
  }catch(e){toast("❌ Eroare","err");}
}

// Elev bifează repetiție
async function logPractice(studentId, type){
  const week=getWeekStart();
  const existing=A.practices.find(p=>p.student_id===studentId&&p.week_start===week);
  try{
    if(existing){
      // Upgrade la clip dacă deja există bifare
      if(existing.type==="bifare"&&type==="clip"){
        await db.patch("practice_logs",existing.id,{type:"clip"});
        A.practices=A.practices.map(p=>p.id===existing.id?{...p,type:"clip"}:p);
      }
    } else {
      const r=await db.post("practice_logs",{student_id:studentId,week_start:week,type});
      A.practices=[r[0],...A.practices];
    }
    toast(type==="clip"?"🟢 Înregistrare trimisă!":"🟡 Repetiție bifată!",type==="clip"?"ok":"warn");
    render();
  }catch(e){toast("❌ Eroare","err");}
}

async function deleteStudent(id, name){
  if(!confirm(`Ești sigur că vrei să ștergi definitiv elevul ${name}?

Această acțiune nu poate fi anulată — se vor șterge și toate lecțiile și datele lui.`)) return;
  if(!confirm(`Confirmare finală: ștergi ${name} și tot istoricul lui?`)) return;
  try{
    await fetch(`${SB_URL}/rest/v1/lessons?student_id=eq.${id}`,{method:"DELETE",headers:H});
    await fetch(`${SB_URL}/rest/v1/practice_logs?student_id=eq.${id}`,{method:"DELETE",headers:H});
    await fetch(`${SB_URL}/rest/v1/students?id=eq.${id}`,{method:"DELETE",headers:H});

    const section=document.getElementById("archived-section");
    if(section) section.innerHTML="";

}

    toast(`✅ ${name} reactivat!`);
    render();
  }catch(e){toast("❌ Eroare","err");}
}

function rStatistici(){
  const now=new Date();

  // ── Helpers ──
  function getMonday(d){
    const dt=new Date(d);
    const day=dt.getDay();
    const diff=dt.getDate()-(day===0?6:day-1);
    return new Date(dt.setDate(diff));
  }
  function formatDate(d){
    return `${d.getDate().toString().padStart(2,"0")}.${(d.getMonth()+1).toString().padStart(2,"0")}`;
  }
  function formatMonth(d){
    const months=["Ian","Feb","Mar","Apr","Mai","Iun","Iul","Aug","Sep","Oct","Nov","Dec"];
    return `${months[d.getMonth()]} ${d.getFullYear()}`;
  }

  // ── Săptămâni din weekly_income ──
  const allIncome=[...A.weeklyIncome].sort((a,b)=>a.date.localeCompare(b.date));
  const wo=A.weekOffset||0;

  const weeks=[];
  for(let i=7;i>=0;i--){
    const d=new Date(now);
    d.setDate(d.getDate()-(i*7)-(wo*8*7));
    const monday=getMonday(d);
    const sunday=new Date(monday);
    sunday.setDate(monday.getDate()+6);
    const label=`${formatDate(monday)}-${formatDate(sunday)}`;
    const mondayStr=monday.toISOString().split("T")[0];
    const sundayStr=sunday.toISOString().split("T")[0];
    const weekIncome=allIncome.filter(w=>w.date>=mondayStr&&w.date<=sundayStr);
    const weekLessons=A.lessons.filter(l=>l.date>=mondayStr&&l.date<=sundayStr);
    const incasatHistoric=weekIncome.reduce((s,w)=>s+w.amount,0);
    const incasatLectii=weekLessons.filter(l=>l.paid).reduce((s,l)=>s+(l.price||100),0);
    const restantaLectii=weekLessons.filter(l=>!l.paid&&l.present!==false).reduce((s,l)=>s+(l.price||100),0);
    const incasat=incasatHistoric+incasatLectii;
    weeks.push({label,incasat,restanta:restantaLectii,nrLectii:weekIncome.length+weekLessons.length});
  }

  // ── Luni din weekly_income ──
  const mo=A.monthOffset||0;
  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i-(mo*6),1);
    const start=d.toISOString().split("T")[0];
    const end=new Date(d.getFullYear(),d.getMonth()+1,0).toISOString().split("T")[0];
    const label=formatMonth(d);
    const monthIncome=allIncome.filter(w=>w.date>=start&&w.date<=end);
    const monthLessons=A.lessons.filter(l=>l.date>=start&&l.date<=end);
    const incasatHistoric=monthIncome.reduce((s,w)=>s+w.amount,0);
    const incasatLectii=monthLessons.filter(l=>l.paid).reduce((s,l)=>s+(l.price||100),0);
    const restantaLectii=monthLessons.filter(l=>!l.paid&&l.present!==false).reduce((s,l)=>s+(l.price||100),0);
    const incasat=incasatHistoric+incasatLectii;
    months.push({label,incasat,restanta:restantaLectii,nrLectii:monthIncome.length+monthLessons.length});
  }

  // ── Totale din lecții reale ──
  const totalIncasatLectii=A.lessons.filter(l=>l.paid).reduce((s,l)=>s+(l.price||100),0);
  const totalRestantaLectii=A.lessons.filter(l=>!l.paid&&l.present!==false).reduce((s,l)=>s+(l.price||100),0);
  // Total din weekly_income (date istorice)
  const totalIncasatHistoric=allIncome.reduce((s,w)=>s+w.amount,0);
  const totalIncasat=totalIncasatLectii+totalIncasatHistoric;
  const totalRestanta=totalRestantaLectii;
  const totalLectii=A.lessons.length;

  // ── Max pentru grafic ──
  const maxWeek=Math.max(...weeks.map(w=>w.incasat+w.restanta),1);
  const maxMonth=Math.max(...months.map(m=>m.incasat+m.restanta),1);

  function barChart(data, max){
    return data.map(d=>`
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:0">
        <div style="width:100%;display:flex;flex-direction:column;align-items:center;height:100px;justify-content:flex-end;gap:2px">
          ${d.restanta>0?`<div style="width:70%;border-radius:4px 4px 0 0;background:rgba(192,96,96,0.4);height:${Math.round((d.restanta/max)*90)}px" title="${d.restanta} RON restanță"></div>`:""}
          ${d.incasat>0?`<div style="width:70%;border-radius:${d.restanta>0?"0":"4px 4px"} 0 0;background:var(--accent);height:${Math.round((d.incasat/max)*90)}px" title="${d.incasat} RON încasat"></div>`:""}
          ${d.incasat===0&&d.restanta===0?`<div style="width:70%;height:3px;background:var(--border);border-radius:2px"></div>`:""}
        </div>
        <div style="font-size:9px;color:var(--text2);text-align:center;line-height:1.3;word-break:break-all">${d.label}</div>
        <div style="font-size:10px;font-weight:600;color:var(--accent)">${d.incasat>0?d.incasat+" RON":""}</div>
      </div>
    `).join("");
  }

  return`<div class="ph">
    <div><div class="ph-title">📊 Statistici</div><div class="ph-sub">Venituri și activitate</div></div>
  </div>
  <div class="pb">

    <!-- Totale -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px">
      <div class="stat-c"><div class="stat-lbl">Total încasat</div><div class="stat-val gr">${totalIncasat.toLocaleString()}</div><div style="font-size:10px;color:var(--text2);margin-top:2px">RON</div></div>
      <div class="stat-c"><div class="stat-lbl">Restanțe</div><div class="stat-val ${totalRestanta>0?"r":"gr"}">${totalRestanta.toLocaleString()}</div><div style="font-size:10px;color:var(--text2);margin-top:2px">RON</div></div>
      <div class="stat-c"><div class="stat-lbl">Total lecții</div><div class="stat-val g">${totalLectii}</div><div style="font-size:10px;color:var(--text2);margin-top:2px">înregistrate</div></div>
    </div>

    <!-- Grafic săptămânal -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div class="sec-title" style="margin-bottom:0">📅 Venituri săptămânale</div>
        <div style="display:flex;gap:6px">
          <button onclick="A.weekOffset=(A.weekOffset||0)+1;render()" style="padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;cursor:pointer">← Înapoi</button>
          <button onclick="A.weekOffset=Math.max(0,(A.weekOffset||0)-1);render()" ${(A.weekOffset||0)===0?"disabled style='opacity:0.3;cursor:default;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px'":"style='padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;cursor:pointer'"}>Înainte →</button>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:16px">${(A.weekOffset||0)===0?"Ultimele 8 săptămâni":`Acum ${(A.weekOffset||0)*8*7+8*7} - ${(A.weekOffset||0)*8*7} zile în urmă`}</div>
      <div style="display:flex;gap:4px;align-items:flex-end;height:130px">
        ${barChart(weeks,maxWeek)}
      </div>
      <div style="display:flex;gap:16px;margin-top:12px;font-size:11px">
        <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:var(--accent)"></div>Încasat</div>
        <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:rgba(192,96,96,0.4)"></div>Restanță</div>
      </div>

function getUnreadNotifs(){
  // Practices from last 7 days not yet "seen"
  const seen=JSON.parse(localStorage.getItem("pm_seen_notifs")||"[]");
  return A.practices.filter(p=>{
    if(seen.includes(p.id)) return false;
    const d=new Date(p.week_start);
    const diff=(Date.now()-d)/(1000*60*60*24);
    return diff<=7;
  });
}

async function deletePracticeLog(id, fileUrl){
  if(!confirm("Ștergi această înregistrare? Nu poate fi recuperată.")) return;
  try{
    // Delete file from storage if exists
    if(fileUrl){
      const path=fileUrl.split("/public/recordings/")[1];
      if(path){
        await fetch(`${SB_URL}/storage/v1/object/recordings/${path}`,{
          method:"DELETE",
          headers:{"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`}
        });
      }
    }
    // Delete from practice_logs
    await fetch(`${SB_URL}/rest/v1/practice_logs?id=eq.${id}`,{method:"DELETE",headers:H});
    A.practices=A.practices.filter(p=>p.id!==id);
    toast("🗑 Înregistrare ștearsă!");
    render();
  }catch(e){toast("❌ Eroare","err");}
}

async function playAudioFromStreak(fileUrl, practiceId){
  const existing=document.getElementById("streak-audio-player");
  if(existing) existing.remove();

  const wrap=document.createElement("div");
  wrap.id="streak-audio-player";
  wrap.style.cssText="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:400px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:14px 16px;z-index:150;box-shadow:0 8px 32px rgba(0,0,0,0.5)";
  wrap.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:13px;font-weight:600;color:var(--text)">🎙 Înregistrare</div>
      <div style="display:flex;gap:6px">
        <button onclick="deleteRecording('${practiceId}','${fileUrl}');document.getElementById('streak-audio-player')?.remove()"
          style="padding:4px 10px;border-radius:20px;background:rgba(192,96,96,0.1);border:1px solid rgba(192,96,96,0.3);color:var(--danger);font-size:11px;cursor:pointer;font-family:var(--body)">🗑 Șterge</button>
        <button onclick="document.getElementById('streak-audio-player').remove()"
          style="padding:4px 10px;border-radius:20px;background:var(--surface3);border:1px solid var(--border2);color:var(--text2);font-size:11px;cursor:pointer;font-family:var(--body)">✕</button>
      </div>
    </div>
    <div id="streak-audio-loading" style="text-align:center;padding:12px;color:var(--text2);font-size:13px">⏳ Se încarcă...</div>
  `;
  document.body.appendChild(wrap);

  try{
    const resp=await fetch(fileUrl,{headers:{"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`}});
    if(!resp.ok) throw new Error("Fetch failed");
    const blob=await resp.blob();
    const blobUrl=URL.createObjectURL(blob);

    const loading=document.getElementById("streak-audio-loading");
    if(loading){
      const audio=document.createElement("audio");
      audio.controls=true;
      audio.style.cssText="width:100%;border-radius:8px";
      audio.src=blobUrl;
      loading.replaceWith(audio);
      audio.load();
      audio.play().catch(()=>{});
    }
  }catch(e){
    console.error(e);
    const loading=document.getElementById("streak-audio-loading");
    if(loading) loading.textContent="❌ Nu se poate încărca înregistrarea";
  }
}

function getNeedReminder(){
  const now=new Date();
  return A.students.filter(s=>{
    const ls=sLessons(s.id);
    if(!ls.length) return false;
    const lastLesson=new Date(ls[0].date);
    const daysSince=Math.floor((now-lastLesson)/(1000*60*60*24));
    if(daysSince<4) return false;
    const thisWeek=getWeekStart(ls[0].date);
    const hasPractice=A.practices.some(p=>p.student_id===s.id&&p.week_start>=thisWeek);
    return !hasPractice;
  });
}

function rAcasa(){
  const now=new Date();
  const todayStr=now.toISOString().split("T")[0];
  const yesterdayStr=new Date(now-86400000).toISOString().split("T")[0];

  // Activitate recentă — ultimele 7 zile
  const recentPr=[...A.practices]
    .filter(p=>p.created_at&&p.created_at>=new Date(now-7*86400000).toISOString())
    .sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))
    .slice(0,20);

  // Dacă nu avem created_at, luăm după week_start
  const thisWeek=getWeekStart();
  const lastWeek=getWeekStart(new Date(now-7*86400000));
  const recentPr2=recentPr.length>0?recentPr:[...A.practices]
    .filter(p=>p.week_start>=lastWeek)
    .sort((a,b)=>b.week_start.localeCompare(a.week_start))
    .slice(0,20);

  const activityHtml=recentPr2.length===0?
    `<div style="text-align:center;padding:30px;color:var(--text2);font-size:14px">Nicio activitate recentă</div>`
    :recentPr2.map(p=>{
      const s=A.students.find(st=>st.id===p.student_id);
      if(!s)return"";
      const icon=p.type==="clip"?"🟢":"🟡";
      const msg=p.type==="clip"?"a trimis o înregistrare":"a bifat că a repetat";
      const when=p.week_start===thisWeek?"săptămâna aceasta":p.week_start===lastWeek?"săptămâna trecută":p.week_start;
      return`<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">
        <div style="font-size:20px">${icon}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:500">${s.name}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">${msg} · ${when}</div>
        </div>
        <div style="font-size:20px">${s.avatar||"🎸"}</div>
      </div>`;
    }).join("");

  // Stats rapide
  const totalStudents=A.students.length;
  const thisWeekPr=A.practices.filter(p=>p.week_start===thisWeek).length;
  const unpaidAll=A.lessons.filter(l=>!l.paid).length;
  const needReminder=getNeedReminder().length;
  const aziSlots=azi?(SCHEDULE[azi]||[]).filter(s=>!s.e&&!s.c).length:0;

  return`<div class="ph">
    <div><div class="ph-title">👋 Bună ziua!</div><div class="ph-sub">${new Date().toLocaleDateString("ro-RO",{weekday:"long",day:"numeric",month:"long"})}</div></div>
  </div>
  <div class="pb">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px">
      <div class="stat-c"><div class="stat-lbl">Elevi activi</div><div class="stat-val g">${totalStudents}</div></div>
      <div class="stat-c"><div class="stat-lbl">Au repetat</div><div class="stat-val gr">${thisWeekPr}</div><div style="font-size:10px;color:var(--text2);margin-top:2px">săpt. aceasta</div></div>
      <div class="stat-c"><div class="stat-lbl">Restanțe</div><div class="stat-val ${unpaidAll>0?"r":"gr"}">${unpaidAll}</div><div style="font-size:10px;color:var(--text2);margin-top:2px">lecții neplătite</div></div>
      <div class="stat-c"><div class="stat-lbl">Reminders</div><div class="stat-val ${needReminder>0?"r":"gr"}" style="cursor:pointer" onclick="go('reminders')">${needReminder}</div><div style="font-size:10px;color:var(--text2);margin-top:2px">de trimis</div></div>
    </div>

    ${azi?`<div style="background:var(--accent-dim);border:1px solid rgba(200,169,110,0.2);border-radius:var(--r);padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px">
      <div style="width:7px;height:7px;border-radius:50%;background:var(--accent);animation:blink 2s infinite;flex-shrink:0"></div>
      <span style="font-size:13px;color:var(--accent)">Azi — <strong>${azi}</strong> — ai <strong>${aziSlots} lecții</strong> programate</span>
      <button onclick="go('schedule')" style="margin-left:auto;padding:5px 12px;border-radius:20px;background:var(--accent);border:none;color:#0a0a0c;font-size:11px;font-weight:600;cursor:pointer">Vezi orarul</button>
    </div>`:""}

    <div style="font-family:var(--display);font-size:17px;font-weight:700;margin-bottom:4px">📱 Activitate recentă</div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:14px">Ce au făcut elevii în ultimele 7 zile</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:0 16px">
      ${activityHtml}
    </div>
  </div>`;
}

function rReminders(){
  const students=getNeedReminder();
  const rows=students.map(s=>{
    const ls=sLessons(s.id);
    const lastLesson=ls[0];
    const now=new Date();
    const daysSince=Math.floor((now-new Date(lastLesson.date))/(1000*60*60*24));
    const wa=waLink(s);
    const nextLesson=Object.entries(SCHEDULE).find(([day,slots])=>slots.some(sl=>sl.n&&sl.n.toLowerCase()===s.name.toLowerCase().split(" ")[0].toLowerCase()));
    const nextDay=nextLesson?nextLesson[0]:"—";
    return`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      <div style="width:42px;height:42px;border-radius:11px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${s.avatar||"🎸"}</div>
      <div style="flex:1;min-width:150px">
        <div style="font-size:14px;font-weight:500">${s.name}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px">${s.instrument||""} · Ultima lecție: ${lastLesson.date} (${daysSince} zile)</div>
        <div style="font-size:11px;color:var(--danger);margin-top:2px">⚠️ Nu a bifat repetiția</div>
      </div>
      ${wa?`<a href="${wa}" target="_blank" style="padding:9px 14px;border-radius:var(--r-sm);background:rgba(37,211,102,0.1);border:1px solid rgba(37,211,102,0.25);color:#25d166;font-size:12px;text-decoration:none;font-weight:500;white-space:nowrap">📲 Trimite reminder</a>`:"<span style='font-size:11px;color:var(--muted)'>Fără telefon</span>"}
    </div>`;
  }).join("");

  return`<div class="ph">
    <div>
      <div class="ph-title">🔔 Reminders</div>
      <div class="ph-sub">${students.length} elevi nu au bifat repetiția după 4+ zile</div>
    </div>
  </div>
  <div class="pb">
    ${students.length===0?`
      <div style="text-align:center;padding:60px 20px">
        <div style="font-size:48px;margin-bottom:16px">🎉</div>
        <div style="font-family:var(--display);font-size:20px;font-weight:700;margin-bottom:8px">Totul e în regulă!</div>
        <div style="font-size:14px;color:var(--text2)">Toți elevii au bifat repetiția sau au lecție recentă.</div>
      </div>
    `:rows}
    ${students.length>0?`
      <div style="margin-top:16px;background:var(--accent-dim);border:1px solid rgba(200,169,110,0.2);border-radius:var(--r);padding:14px 16px;font-size:13px;color:var(--accent)">
        💡 Apasă <strong>Trimite reminder</strong> pe fiecare elev — se deschide WhatsApp cu mesajul gata scris.
      </div>
    `:""}
  </div>`;
}

let mediaRecorder=null;
let audioChunks=[];
let recorderTimer=null;
let recSeconds=0;

function startRecorder(studentId){
  const section=document.getElementById("recorder-section");
  if(section) section.style.display="block";

  // Render recorder UI
  const wrap=document.createElement("div");
  wrap.className="recorder-wrap";
  wrap.id="recorder-ui";
  wrap.innerHTML=`
    <div style="font-size:14px;font-weight:600;text-align:center;margin-bottom:16px;color:var(--text)">🎙 Recorder audio</div>
    <button class="recorder-btn idle" id="rec-btn" onclick="toggleRecording('${studentId}')">🎙</button>
    <div class="recorder-timer" id="rec-timer">0:00</div>
    <div class="recorder-status" id="rec-status">Apasă pentru a începe înregistrarea</div>
    <div class="recorder-actions" id="rec-actions" style="display:none">
      <audio id="rec-preview" controls style="width:100%;border-radius:8px;margin-bottom:8px"></audio>
      <button onclick="submitAudio('${studentId}')" style="width:100%;padding:13px;border-radius:var(--r-sm);background:var(--success);border:none;color:#0a0a0c;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--body)">📤 Trimite profesorului</button>
      <button onclick="resetRecorder('${studentId}')" style="width:100%;padding:11px;border-radius:var(--r-sm);background:transparent;border:1px solid var(--border2);color:var(--text2);font-size:13px;cursor:pointer;font-family:var(--body)">🔄 Înregistrează din nou</button>
    </div>
  `;

  // Remove old recorder if exists
  const old=document.getElementById("recorder-ui");
  if(old) old.remove();
  if(section) section.appendChild(wrap);
  else document.querySelector(".practice-card")?.after(wrap);
}

async function toggleRecording(studentId){
  const btn=document.getElementById("rec-btn");
  const status=document.getElementById("rec-status");
  const timer=document.getElementById("rec-timer");

  if(!mediaRecorder||mediaRecorder.state==="inactive"){
    // Start recording
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      audioChunks=[];
      recSeconds=0;

      // Try different MIME types for compatibility
      const mimeType=MediaRecorder.isTypeSupported("audio/webm;codecs=opus")?"audio/webm;codecs=opus":
                     MediaRecorder.isTypeSupported("audio/mp4")?"audio/mp4":"audio/webm";

      mediaRecorder=new MediaRecorder(stream,{mimeType});
      mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
      mediaRecorder.onstop=()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(audioChunks,{type:mimeType});
        const url=URL.createObjectURL(blob);
        const preview=document.getElementById("rec-preview");
        if(preview) preview.src=url;
        document.getElementById("rec-actions").style.display="flex";
        document.getElementById("rec-actions").style.flexDirection="column";
        btn.className="recorder-btn done";
        btn.textContent="✓";
        btn.onclick=null;
        status.textContent="Ascultă înregistrarea și trimite!";
      };
      mediaRecorder.start(100);

      btn.className="recorder-btn recording";
      btn.textContent="⏹";
      status.textContent="🔴 Se înregistrează... apasă pentru a opri";

      recorderTimer=setInterval(()=>{
        recSeconds++;
        const m=Math.floor(recSeconds/60);
        const s=recSeconds%60;
        if(timer) timer.textContent=`${m}:${s.toString().padStart(2,"0")}`;
        // Auto stop after 3 minutes
        if(recSeconds>=180){toggleRecording(studentId);}
      },1000);

    }catch(e){
      status.textContent="❌ Nu am acces la microfon. Verifică permisiunile.";
      status.style.color="var(--danger)";
    }
  } else {
    // Stop recording
    clearInterval(recorderTimer);
    mediaRecorder.stop();
    btn.className="recorder-btn idle";
    status.textContent="⏳ Se procesează...";
  }
}

function resetRecorder(studentId){
  mediaRecorder=null;
  audioChunks=[];
  recSeconds=0;
  clearInterval(recorderTimer);
  startRecorder(studentId);
}

async function submitAudio(studentId){
  if(!audioChunks.length){toast("Nu ai nicio înregistrare","err");return;}
  const btn=document.querySelector("#rec-actions button");
  if(btn){btn.textContent="⏳ Se trimite...";btn.disabled=true;}
  toast("⏳ Se trimite înregistrarea...");

  try{
    const mimeType=mediaRecorder?.mimeType||"audio/webm";
    const ext=mimeType.includes("mp4")?"m4a":mimeType.includes("ogg")?"ogg":"webm";
    const blob=new Blob(audioChunks,{type:mimeType});
    const thisWeek=getWeekStart();
    const fileName=`${studentId}/${thisWeek}_${Date.now()}.${ext}`;

    const uploadRes=await fetch(`${SB_URL}/storage/v1/object/recordings/${fileName}`,{
      method:"POST",
      headers:{"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,"Content-Type":mimeType,"x-upsert":"true"},
      body:blob,
    });

    if(!uploadRes.ok) throw new Error(await uploadRes.text());
    const fileUrl=`${SB_URL}/storage/v1/object/public/recordings/${fileName}`;

    const existing=await db.get("practice_logs",`?student_id=eq.${studentId}&week_start=eq.${thisWeek}`);
    if(existing&&existing.length>0){
      await db.patch("practice_logs",existing[0].id,{type:"clip",file_url:fileUrl});
    } else {
      await db.post("practice_logs",{student_id:studentId,week_start:thisWeek,type:"clip",file_url:fileUrl});
    }

    toast("🟢 Înregistrare trimisă!");
    mediaRecorder=null; audioChunks=[];
    setTimeout(()=>renderElev(location.pathname.match(/^\/elev\/(.+)$/)[1]),800);
  }catch(e){
    console.error(e);
    toast("❌ Eroare la trimitere","err");
    const btn=document.querySelector("#rec-actions button");
    if(btn){btn.textContent="📤 Trimite profesorului";btn.disabled=false;}
  }
}

async function submitBifare(studentId){
  const thisWeek=getWeekStart();
  try{
    await db.post("practice_logs",{student_id:studentId,week_start:thisWeek,type:"bifare"});
    toast("🟡 Mulțumesc! Profesorul va vedea că ai repetat.","warn");
    // Reîncarcă pagina elevului
    setTimeout(()=>renderElev(location.pathname.match(/^\/elev\/(.+)$/)[1]),800);
  }catch(e){toast("❌ Eroare","err");}
}

async function convertToMp4(file){
  // Use MediaRecorder API to re-encode if needed
  // For MOV/HEVC from iPhone, we use a canvas+video trick
  return new Promise((resolve)=>{
    const url=URL.createObjectURL(file);
    const video=document.createElement("video");
    video.src=url;
    video.muted=true;
    video.playsInline=true;

    video.onloadedmetadata=()=>{
      // If browser can play it natively, just return original
      if(video.readyState>=2){
        resolve(file);
        return;
      }
      resolve(file);
    };
    video.onerror=()=>{
      // Can't decode, return original and hope for the best
      resolve(file);
    };
    video.load();
    // Timeout fallback
    setTimeout(()=>resolve(file),3000);
  });
}

async function uploadFile(file, studentId){
  const ext=file.name.split(".").pop().toLowerCase();
  const fileName=`${studentId}/${getWeekStart()}_${Date.now()}.${ext}`;

  // Try upload with original file
  const uploadRes=await fetch(`${SB_URL}/storage/v1/object/recordings/${fileName}`,{
    method:"POST",
    headers:{
      "apikey":SB_KEY,
      "Authorization":`Bearer ${SB_KEY}`,
      "Content-Type":file.type||"video/mp4",
      "x-upsert":"true",
    },
    body:file,
  });

  if(!uploadRes.ok){
    const err=await uploadRes.text();
    throw new Error(err);
  }

  return`${SB_URL}/storage/v1/object/public/recordings/${fileName}`;
}

async function submitClip(studentId){
  const file=document.getElementById("clip-upload")?.files?.[0];
  if(!file)return;
  const thisWeek=getWeekStart();

  // Show progress
  const btn=document.querySelector(".prac-btn.clip");
  if(btn){btn.textContent="⏳ Se trimite...";btn.disabled=true;}
  toast("⏳ Se trimite înregistrarea...");

  try{
    const fileUrl=await uploadFile(file, studentId);

    const existing=await db.get("practice_logs",`?student_id=eq.${studentId}&week_start=eq.${thisWeek}`);
    if(existing&&existing.length>0){
      await db.patch("practice_logs",existing[0].id,{type:"clip",file_url:fileUrl});
    } else {
      await db.post("practice_logs",{student_id:studentId,week_start:thisWeek,type:"clip",file_url:fileUrl});
    }
    toast("🟢 Înregistrare trimisă!");
    setTimeout(()=>renderElev(location.pathname.match(/^\/elev\/(.+)$/)[1]),800);
  }catch(e){
    console.error(e);
    toast("❌ Eroare la trimitere. Încearcă din nou.","err");
    if(btn){btn.textContent="🎬 Da, trimit o înregistrare";btn.disabled=false;}
  }
}

async function openVideoModal(url, name){
  const existing=document.getElementById("video-modal-overlay");
  if(existing)existing.remove();

  const overlay=document.createElement("div");
  overlay.id="video-modal-overlay";
  overlay.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:20px;overflow-y:auto";
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};

  const closeBtn=`<div style="display:flex;justify-content:space-between;align-items:center;width:100%;max-width:640px;flex-shrink:0">
    <div style="font-family:var(--display);font-size:18px;font-weight:700;color:#fff">${name}</div>
    <button onclick="document.getElementById('video-modal-overlay').remove()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px;flex-shrink:0">✕</button>
  </div>`;

  overlay.innerHTML=closeBtn+`<div style="color:rgba(255,255,255,0.6);font-size:13px">⏳ Se pregătește playerul...</div>`;
  document.body.appendChild(overlay);

  try{
    // Use Vercel proxy to bypass Content-Disposition header
    const proxyUrl=`/api/video?url=${encodeURIComponent(url)}`;
    const blobUrl=proxyUrl;
    const mimeType="video/mp4";

    // Create video element
    const videoWrap=document.createElement("div");
    videoWrap.style.cssText="width:100%;max-width:640px;background:#000;border-radius:12px;overflow:hidden;flex-shrink:0";

    const video=document.createElement("video");
    video.controls=true;
    video.playsInline=true;
    video.style.cssText="width:100%;display:block;max-height:60vh;";
    video.preload="auto";

    // Use proxy URL
    const source1=document.createElement("source");
    source1.src=blobUrl;
    source1.type="video/mp4";
    video.appendChild(source1);
    const source2=document.createElement("source");
    source2.src=url;
    source2.type="video/mp4";
    video.appendChild(source2);

    video.onerror=()=>{
      // Video can't play — show download option
      videoWrap.innerHTML=`<div style="padding:30px;text-align:center;color:rgba(255,255,255,0.6)">
        <div style="font-size:32px;margin-bottom:8px">🎵</div>
        <div style="font-size:13px;margin-bottom:12px">Formatul video nu poate fi redat direct.<br>Descarcă fișierul pentru a-l asculta.</div>
      </div>`;
    };

    videoWrap.appendChild(video);

    // Download button
    const dlBtn=document.createElement("a");
    dlBtn.href=url;
    dlBtn.download=`inregistrare_${name}_${Date.now()}`;
    dlBtn.target="_blank";
    dlBtn.style.cssText="padding:10px 20px;border-radius:8px;background:rgba(200,169,110,0.2);border:1px solid rgba(200,169,110,0.4);color:var(--accent);font-size:13px;text-decoration:none;flex-shrink:0";
    dlBtn.textContent="⬇ Descarcă înregistrarea";

    // Clear loading and add content
    overlay.innerHTML=closeBtn;
    overlay.appendChild(videoWrap);
    overlay.appendChild(dlBtn);

    // Try to play
    try{await video.play();}catch(e){console.log("Autoplay blocked");}

  }catch(e){
    console.error(e);
    overlay.innerHTML=closeBtn+`<div style="color:var(--danger);font-size:14px;text-align:center">
      ❌ Nu pot încărca fișierul.<br>
      <a href="${url}" target="_blank" style="color:var(--accent);text-decoration:none;font-size:13px;display:inline-block;margin-top:8px">Deschide în tab nou</a>
    </div>`;
  }
}
